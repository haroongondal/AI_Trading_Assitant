# AI Trading Assistant - backend + frontend. Run from backend/: docker compose up --build
# Expects frontend at ../frontend. Use host Ollama at 127.0.0.1:11434
services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - DATABASE_URL=sqlite+aiosqlite:///./data/trading_assistant.db
    volumes:
      - backend_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    image: node:24-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev"
    volumes:
      - ../frontend:/app
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
